name: Release

# Triggered by pushing a tag like `v0.2.1`. Builds the GUI `thclaws` binary
# for six targets, then publishes a GitHub Release with the binaries +
# SHA-256 sidecars.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.2.1). The tag must already exist.'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            os: macos
            archive: tar.gz
          # macos-13 (Intel runner) was retired. Cross-compile Intel macOS
          # from the arm64 runner using `--target x86_64-apple-darwin` — the
          # Apple SDK is universal, so wry's `-framework WebKit` links fine.
          - runner: macos-14
            target: x86_64-apple-darwin
            os: macos
            archive: tar.gz
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            os: linux
            archive: tar.gz
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            os: linux
            archive: tar.gz
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            os: windows
            archive: zip
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            os: windows
            archive: zip

    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      # Resolve the tag name once for all subsequent steps. For push-triggered
      # runs this is `github.ref_name`; for manual runs, `inputs.tag`.
      - name: Resolve tag
        id: tag
        shell: bash
        run: echo "name=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Install Linux GUI deps (webkit2gtk for wry)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: ${{ matrix.target }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build thclaws (GUI)
        shell: bash
        # Run from repo root: workspace Cargo.toml at root since #2.
        # Binary lands at ./target/<target>/release/thclaws.
        run: cargo build --release --bin thclaws --features gui --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          VERSION="${{ steps.tag.outputs.name }}"
          NAME="thclaws-${VERSION}-${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/thclaws" dist/thclaws
          strip dist/thclaws || true
          tar -czf "dist/${NAME}.tar.gz" -C dist thclaws
          rm dist/thclaws
          cd dist
          if command -v shasum >/dev/null; then
            shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          else
            sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          fi

      - name: Package (windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $version = "${{ steps.tag.outputs.name }}"
          $name = "thclaws-$version-${{ matrix.target }}"
          New-Item -Force -ItemType Directory dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/thclaws.exe" "dist/thclaws.exe"
          Compress-Archive -Path dist/thclaws.exe -DestinationPath "dist/$name.zip" -Force
          Remove-Item dist/thclaws.exe
          $hash = (Get-FileHash "dist/$name.zip" -Algorithm SHA256).Hash.ToLower()
          Set-Content "dist/$name.zip.sha256" "$hash  $name.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: thclaws-${{ matrix.target }}
          path: dist/*

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
